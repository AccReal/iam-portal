services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: iam_db
      POSTGRES_USER: iam_user
      POSTGRES_PASSWORD: iam_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iam_user -d iam_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import httpx; httpx.get(\"http://localhost:8000/health\")' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery-worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A app.tasks.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # ---------------------------------------------------------------------------
  # Phase 3: Relying Parties for SSO demo
  # ---------------------------------------------------------------------------

  # Odoo 17 — connect via: Settings → OAuth Providers
  # client_id: odoo  |  redirect_uri: http://localhost:8069/web/login
  # Authorization URL: http://localhost:8000/oauth/authorize
  # Token URL:         http://localhost:8000/oauth/token
  # JWKS URL:          http://localhost:8000/.well-known/jwks.json
  odoo:
    image: odoo:17
    depends_on:
      odoo-db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./demo-apps/odoo-addons:/mnt/extra-addons
    environment:
      HOST: odoo-db
      USER: odoo
      PASSWORD: odoo_password
    command: --without-demo=all -d odoo -i iam_sso

  odoo-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo_password
    volumes:
      - odoo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # nginx — HTTPS reverse proxy for Nextcloud (user_oidc requires HTTPS)
  # Nextcloud available at https://localhost:8443
  # Self-signed cert is generated on first start inside the container.
  nginx:
    image: nginx:alpine
    ports:
      - "8443:443"
      - "8444:8444"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs
    depends_on:
      - nextcloud
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache openssl
        mkdir -p /etc/nginx/certs
        if [ ! -f /etc/nginx/certs/cert.crt ]; then
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -keyout /etc/nginx/certs/cert.key -out /etc/nginx/certs/cert.crt -subj '/C=RU/O=IAM Portal/CN=localhost' -addext 'subjectAltName=DNS:localhost,IP:127.0.0.1'
        fi
        exec nginx -g 'daemon off;'

  # Nextcloud 28 — connect via: Apps → OpenID Connect user backend (user_oidc)
  # Access via HTTPS: https://localhost:8443
  # Provider URL:      http://localhost:8000
  # client_id: nextcloud  |  client_secret: NMCvIRGI9mS3z60fRWAFQCPPHghthRWM4B73jUfk8Gg
  # Mapping: sub → UID, email, displayName → preferred_username
  nextcloud:
    image: nextcloud:28
    depends_on:
      nextcloud-db:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - nextcloud-data:/var/www/html
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_password
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin_password
      NEXTCLOUD_TRUSTED_DOMAINS: localhost nextcloud
      OVERWRITEPROTOCOL: https
      OVERWRITEHOST: localhost:8443
      OVERWRITECLIURL: https://localhost:8443
      TRUSTED_PROXIES: nginx

  nextcloud-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_password
    volumes:
      - nextcloud-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Grafana — Отчёты / Аналитика (port 8091)
  # OIDC: полностью через env vars, работает сразу
  # Redirect URI: http://localhost:8091/login/generic_oauth
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "8091:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:8091"
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "IAM Portal"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "GrafanaOAuthSecret2024"
      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email"
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://localhost:8000/oauth/authorize"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://backend:8000/oauth/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://backend:8000/oauth/userinfo"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_USE_PKCE: "true"
      GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH: "email"
      GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH: "email"
      GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH: "name"
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin_password"
    depends_on:
      backend:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # EspoCRM — CRM Система (port 8090)
  # OIDC: настраивается через data/config-internal.php
  # Redirect URI: http://localhost:8090?entryPoint=oauthCallback
  # ---------------------------------------------------------------------------
  espocrm:
    image: espocrm/espocrm:latest
    ports:
      - "8090:80"
    depends_on:
      espocrm-db:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - espocrm-data:/var/www/html/data
      # NB: НЕ монтируем сюда config-internal.php — он помечает isInstalled=true,
      # и EspoCRM не создаёт таблицы на свежей БД. Даём установиться самому из
      # env, OIDC включается потом в Администрирование → Аутентификация.
    environment:
      ESPOCRM_DATABASE_PLATFORM: Mysql
      ESPOCRM_DATABASE_HOST: espocrm-db
      ESPOCRM_DATABASE_PORT: 3306
      ESPOCRM_DATABASE_NAME: espocrm
      ESPOCRM_DATABASE_USER: espocrm
      ESPOCRM_DATABASE_PASSWORD: espocrm_password
      ESPOCRM_ADMIN_USERNAME: admin
      ESPOCRM_ADMIN_PASSWORD: admin_password
      ESPOCRM_SITE_URL: "http://localhost:8090"
      ESPOCRM_CONFIG_LOGGER_LEVEL: WARNING

  espocrm-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: espocrm
      MYSQL_USER: espocrm
      MYSQL_PASSWORD: espocrm_password
    volumes:
      - espocrm-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "espocrm", "-pespocrm_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # InvenTree — Склад / Управление запасами (port 8092)
  # OIDC: настроить в Admin → Social Applications → Add → OpenID Connect
  #   Provider: openid_connect | Name: IAM Portal | Client ID: inventree
  #   Secret: InvenTreeSecret2024 | Server URL: http://backend:8000
  # Redirect URI: http://localhost:8092/accounts/oidc/login/callback/
  # ---------------------------------------------------------------------------
  inventree:
    image: inventree/inventree:stable
    ports:
      - "8092:8000"
    depends_on:
      inventree-db:
        condition: service_healthy
    volumes:
      - inventree-data:/home/inventree/data
      - ./inventree/config.yaml:/home/inventree/data/config.yaml:ro
    environment:
      INVENTREE_DB_ENGINE: postgresql
      INVENTREE_DB_NAME: inventree
      INVENTREE_DB_USER: inventree
      INVENTREE_DB_PASSWORD: inventree_password
      INVENTREE_DB_HOST: inventree-db
      INVENTREE_ADMIN_USER: admin
      INVENTREE_ADMIN_EMAIL: admin@company.ru
      INVENTREE_ADMIN_PASSWORD: admin_password
      INVENTREE_SITE_URL: "http://localhost:8092"
      INVENTREE_DEBUG: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # One-shot init: configure OIDC social app in InvenTree
  inventree-setup:
    image: inventree/inventree:stable
    restart: "no"
    depends_on:
      inventree:
        condition: service_healthy
    volumes:
      - inventree-data:/home/inventree/data
      - ./inventree/config.yaml:/home/inventree/data/config.yaml:ro
      - ./inventree/setup_oidc.py:/tmp/setup_oidc.py:ro
    command: >
      sh -c "cd /home/inventree/src/backend/InvenTree && python manage.py shell < /tmp/setup_oidc.py"
    environment:
      INVENTREE_DB_ENGINE: postgresql
      INVENTREE_DB_NAME: inventree
      INVENTREE_DB_USER: inventree
      INVENTREE_DB_PASSWORD: inventree_password
      INVENTREE_DB_HOST: inventree-db

  inventree-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: inventree
      POSTGRES_USER: inventree
      POSTGRES_PASSWORD: inventree_password
    volumes:
      - inventree-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventree"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Roundcube — Корпоративная почта (port 8093)
  # OIDC/OAuth2: настроен через config.inc.php — работает сразу
  # Redirect URI: http://localhost:8093/
  # IMAP: Dovecot с валидацией OAuth2 токенов через IAM userinfo
  # ---------------------------------------------------------------------------
  roundcube:
    image: roundcube/roundcubemail:latest
    ports:
      - "8093:80"
    depends_on:
      roundcube-db:
        condition: service_healthy
      dovecot:
        condition: service_started
    volumes:
      - ./roundcube/config.inc.php:/var/roundcube/config/config.inc.php:ro

  roundcube-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: roundcube
      POSTGRES_USER: roundcube
      POSTGRES_PASSWORD: roundcube_password
    volumes:
      - roundcube-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roundcube"]
      interval: 5s
      timeout: 5s
      retries: 5

  dovecot:
    image: dovecot/dovecot:2.3
    volumes:
      - ./dovecot/dovecot.conf:/etc/dovecot/dovecot.conf:ro
      - ./dovecot/dovecot-oauth2.conf.ext:/etc/dovecot/dovecot-oauth2.conf.ext:ro
      - dovecot-mail:/var/mail/vhosts

volumes:
  pgdata:
  odoo-data:
  odoo-pgdata:
  nextcloud-data:
  nextcloud-pgdata:
  nginx-certs:
  grafana-data:
  espocrm-data:
  espocrm-db-data:
  inventree-data:
  inventree-pgdata:
  roundcube-pgdata:
  dovecot-mail:
