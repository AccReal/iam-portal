events {
    worker_connections 1024;
}

http {
    # Nextcloud — https://localhost:8443
    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.crt;
        ssl_certificate_key /etc/nginx/certs/cert.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        client_max_body_size 512M;

        location / {
            proxy_pass http://nextcloud:80;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Host  $host:8443;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      3600;
        }
    }

    # IAM backend — https://localhost:8444
    # Needed so that browser navigations from HTTPS Nextcloud to the IAM
    # authorization endpoint stay same-scheme (HTTPS→HTTPS), allowing the
    # SameSite=Lax refresh_token cookie to be sent correctly.
    server {
        listen 8444 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/cert.crt;
        ssl_certificate_key /etc/nginx/certs/cert.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://backend:8000;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            proxy_buffering         off;
            proxy_request_buffering off;
            proxy_read_timeout      120;
        }
    }
}
