# Dovecot configuration — IMAP server for Roundcube
# Roundcube uses OAuth2 to get an identity (email), then connects to IMAP
# with PLAIN auth using the sub claim as password. Dovecot accepts any
# password — real authentication already happened via IAM OAuth2.

protocols = imap
disable_plaintext_auth = no
auth_mechanisms = plain login

# Accept any password (identity already validated via IAM OAuth2 flow)
passdb {
  driver = static
  args = password=%w
}

# Dynamic userdb: creates maildir for any authenticated user
userdb {
  driver = static
  args = uid=vmail gid=vmail home=/var/mail/vhosts/%d/%n
}

# Mail storage
mail_location = maildir:/var/mail/vhosts/%d/%n
first_valid_uid = 0
first_valid_gid = 0

namespace inbox {
  inbox = yes
  location =
  separator = /
}

mail_debug = no
verbose_proctitle = no

service auth {
  inet_listener {
    port = 0
  }
}

service imap-login {
  inet_listener imap {
    port = 143
  }
}
