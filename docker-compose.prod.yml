# docker-compose.prod.yml — production overlay.
#
# Запускается поверх docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# (это делает deploy.sh автоматически).
#
# Что меняет:
#   * добавляет Caddy — единая точка входа на портах 80/443 с авто-HTTPS;
#   * отключает старый self-signed nginx (его роль берёт Caddy);
#   * переводит все URL сервисов с localhost на публичный домен из .env (${DOMAIN});
#   * выключает --reload у бэкенда и включает авто-сидинг (SEED_DATA=true).
#
# Все ${DOMAIN}/${ACME_EMAIL} берутся из .env, который генерирует deploy.sh.

services:
  # --- Reverse proxy + автоматический HTTPS -------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-admin@example.com}
    depends_on:
      - backend
      - frontend
    networks:
      default:
        # Чтобы контейнеры-RP (InvenTree, Nextcloud), которым OIDC-discovery
        # отдаёт публичный https://${DOMAIN}, резолвили его ВНУТРИ docker-сети
        # на Caddy, а не ходили в интернет и обратно (hairpin).
        aliases:
          - ${DOMAIN}

  # --- Backend: прод-режим (без --reload) + авто-миграции/сидинг ----------
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      SEED_DATA: "true"

  # --- Frontend: разрешить хост sslip.io за прокси ------------------------
  frontend:
    environment:
      VITE_ALLOWED_HOSTS: ${DOMAIN}

  # --- Старый nginx больше не нужен (заменён Caddy) -----------------------
  nginx:
    profiles: ["legacy"]

  # --- Odoo: доверять заголовкам прокси (https) --------------------------
  odoo:
    command: odoo --proxy-mode --without-demo=all -d odoo -i iam_sso

  # --- Nextcloud: доверенный домен/прокси = поддомен ----------------------
  nextcloud:
    environment:
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.${DOMAIN}
      OVERWRITEHOST: nextcloud.${DOMAIN}
      OVERWRITECLIURL: https://nextcloud.${DOMAIN}
      TRUSTED_PROXIES: 172.16.0.0/12

  # --- Grafana: публичный root URL + browser authorize URL ----------------
  grafana:
    environment:
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://${DOMAIN}/oauth/authorize

  # --- EspoCRM: публичный site URL (OIDC-endpoint правит deplo.sh через sed) -
  espocrm:
    environment:
      ESPOCRM_SITE_URL: https://crm.${DOMAIN}

  # --- InvenTree: миграции отдельным разовым шагом ------------------------
  # На свежей БД сервер выходит с "INVE-W8: Database Migrations required".
  # Прогоняем миграции один раз в inventree-migrate, а сам сервер стартует
  # быстро (без авто-update на каждом старте) и сразу отдаёт API → healthy.
  inventree-migrate:
    image: inventree/inventree:stable
    restart: "no"
    depends_on:
      inventree-db:
        condition: service_healthy
    volumes:
      - inventree-data:/home/inventree/data
      - ./inventree/config.yaml:/home/inventree/data/config.yaml:ro
    environment:
      INVENTREE_DB_ENGINE: postgresql
      INVENTREE_DB_NAME: inventree
      INVENTREE_DB_USER: inventree
      INVENTREE_DB_PASSWORD: inventree_password
      INVENTREE_DB_HOST: inventree-db
      # Без SITE_URL Django падает на "No ALLOWED_HOSTS specified".
      INVENTREE_SITE_URL: https://inventree.${DOMAIN}
      INVENTREE_DEBUG: "true"
    command: invoke migrate

  inventree:
    depends_on:
      inventree-migrate:
        condition: service_completed_successfully
    environment:
      INVENTREE_SITE_URL: https://inventree.${DOMAIN}
      INVENTREE_TRUSTED_ORIGINS: https://inventree.${DOMAIN}
    healthcheck:
      # дать серверу время на первый запуск после миграций
      start_period: 180s

  inventree-setup:
    environment:
      # server_url для OIDC discovery — публичный домен (резолвится на Caddy)
      IAM_SERVER_URL: https://${DOMAIN}
      # SITE_URL нужен и здесь, иначе manage.py shell падает на ALLOWED_HOSTS
      INVENTREE_SITE_URL: https://inventree.${DOMAIN}
      INVENTREE_DEBUG: "true"

  # (Roundcube OIDC-URL правит deploy.sh через sed — env PHP-FPM не видит)

volumes:
  caddy-data:
  caddy-config:
