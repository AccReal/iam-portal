<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доступ запрещён</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: #fee2e2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon svg {
            width: 40px;
            height: 40px;
            color: #dc2626;
        }

        h1 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 15px;
        }

        .message {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .user-info {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }

        .user-info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .user-info-row:last-child {
            border-bottom: none;
        }

        .label {
            color: #6b7280;
            font-size: 14px;
        }

        .value {
            color: #1f2937;
            font-weight: 600;
            font-size: 14px;
        }

        .button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .button:hover {
            background: #5568d3;
        }

        .help-text {
            margin-top: 20px;
            font-size: 14px;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
        </div>

        <h1>Доступ запрещён</h1>
        <p class="message">
            У вас нет прав доступа к приложению <strong>CRM Система</strong>. 
            Обратитесь к администратору для получения необходимых разрешений.
        </p>

        <div class="user-info">
            <div class="user-info-row">
                <span class="label">Пользователь:</span>
                <span class="value" id="userName">-</span>
            </div>
            <div class="user-info-row">
                <span class="label">Email:</span>
                <span class="value" id="userEmail">-</span>
            </div>
            <div class="user-info-row">
                <span class="label">Роль:</span>
                <span class="value" id="userRole">-</span>
            </div>
            <div class="user-info-row">
                <span class="label">Приложение:</span>
                <span class="value">CRM Система</span>
            </div>
        </div>

        <button class="button" onclick="window.close()">Закрыть</button>

        <p class="help-text">
            Для получения доступа свяжитесь с администратором системы
        </p>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        ipcRenderer.on('user-info', (event, user) => {
            document.getElementById('userName').textContent = user.full_name || '-';
            document.getElementById('userEmail').textContent = user.email || '-';
            document.getElementById('userRole').textContent = user.role?.name || '-';
        });
    </script>
</body>
</html>
