<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сервер IAM недоступен</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #fef2f2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 32px 36px;
      width: 440px;
      text-align: center;
    }
    .icon { font-size: 40px; margin-bottom: 8px; }
    h1 { margin: 0 0 8px; font-size: 19px; color: #b91c1c; }
    p { color: #4b5563; font-size: 13px; line-height: 1.55; }
    code {
      display: inline-block;
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }
    .row { display: flex; gap: 10px; margin-top: 20px; }
    button {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #f3f4f6; }
    button.primary { background: #dc2626; color: #fff; border-color: #dc2626; }
    button.primary:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h1>Сервер IAM недоступен</h1>
    <p>
      Не удаётся подключиться к <code id="backend">http://localhost:8000</code>.<br>
      Убедитесь, что backend запущен, затем нажмите «Повторить».
    </p>
    <div class="row">
      <button class="primary" id="btn-retry">Повторить</button>
      <button id="btn-quit">Закрыть</button>
    </div>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('prompt-info', (_event, info) => {
      if (info.backend) document.getElementById('backend').textContent = info.backend;
    });
    document.getElementById('btn-retry').addEventListener('click', () => ipcRenderer.send('iam:recheck'));
    document.getElementById('btn-quit').addEventListener('click', () => ipcRenderer.send('iam:quit'));
  </script>
</body>
</html>
